# --- Persone (stato casa/fuori) ---
text_sensor:
  - platform: homeassistant
    id: pers_1
    entity_id: !secret ent_persona1
    on_value:
      - lvgl.label.update:
          id: lbl_fra
          text: !lambda 'return x == "home" ? std::string("Casa") : std::string("Fuori");'
  - platform: homeassistant
    id: pers_2
    entity_id: !secret ent_persona2
    on_value:
      - lvgl.label.update:
          id: lbl_cos
          text: !lambda 'return x == "home" ? std::string("Casa") : std::string("Fuori");'
  # Stato robot aspirapolvere (pagina Casa)
  - platform: homeassistant
    id: st_vacuum
    entity_id: !secret ent_vacuum
    on_value:
      - lvgl.label.update:
          id: lbl_igor
          text: !lambda |-
            if (x == "cleaning") return std::string("In pulizia");
            if (x == "docked") return std::string("In carica");
            if (x == "returning") return std::string("Rientro");
            if (x == "paused") return std::string("In pausa");
            if (x == "idle") return std::string("Fermo");
            if (x == "error") return std::string("Errore");
            return x;

# Stato switch cucina -> colora i pulsanti quando accesi (pagina Casa)
binary_sensor:
  - platform: homeassistant
    id: st_caffe
    entity_id: !secret ent_sw_caffe
    on_state:
      - if:
          condition:
            lambda: 'return x;'
          then:
            - lvgl.widget.update: { id: btn_caffe, bg_color: 0xFF7043 }
          else:
            - lvgl.widget.update: { id: btn_caffe, bg_color: 0x2A2D3A }
  - platform: homeassistant
    id: st_bollitore
    entity_id: !secret ent_sw_bollitore
    on_state:
      - if:
          condition:
            lambda: 'return x;'
          then:
            - lvgl.widget.update: { id: btn_bollitore, bg_color: 0xFF7043 }
          else:
            - lvgl.widget.update: { id: btn_bollitore, bg_color: 0x2A2D3A }
  - platform: homeassistant
    id: st_deum
    entity_id: !secret ent_sw_deum
    on_state:
      - if:
          condition:
            lambda: 'return x;'
          then:
            - lvgl.widget.update: { id: btn_deum, bg_color: 0x4FC3F7 }
          else:
            - lvgl.widget.update: { id: btn_deum, bg_color: 0x2A2D3A }

# Orologio via SNTP. Aggiorna ora e data (header Home) con on_time (contesto sicuro).
time:
  - platform: sntp
    id: ora
    timezone: Europe/Rome
    on_time:
      - seconds: /20
        then:
          - lvgl.label.update:
              id: lbl_clock
              text: !lambda |-
                auto t = id(ora).now();
                if (!t.is_valid()) return std::string("--:--");
                char buf[8];
                snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
                return std::string(buf);
          - lvgl.label.update:
              id: lbl_date
              text: !lambda |-
                auto t = id(ora).now();
                if (!t.is_valid()) return std::string("");
                static const char* gg[] = {"Domenica","Lunedi","Martedi","Mercoledi","Giovedi","Venerdi","Sabato"};
                static const char* mm[] = {"gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"};
                int dow = t.day_of_week, mo = t.month;
                if (dow < 1 || dow > 7 || mo < 1 || mo > 12) return std::string("");
                char buf[48];
                snprintf(buf, sizeof(buf), "%s %d %s", gg[dow-1], t.day_of_month, mm[mo-1]);
                return std::string(buf);

# --- DISPLAY mipi_rgb: ora pilotato da LVGL (niente lambda/test_card) ---
display:
  - platform: mipi_rgb
    id: lcd
    model: RPI
    auto_clear_enabled: false
    color_order: BGR
    pixel_mode: 16bit
    pclk_frequency: 30MHz   # 50MHz causava crash al boot -> rollback OTA. 30MHz stabile.
    pclk_inverted: true
    dimensions:
      width: 1024
      height: 600
    de_pin: GPIO5
    hsync_pin: GPIO46
    vsync_pin: GPIO3
    pclk_pin: GPIO7
    hsync_pulse_width: 162
    hsync_back_porch: 152
    hsync_front_porch: 48
    vsync_pulse_width: 45
    vsync_back_porch: 13
    vsync_front_porch: 3
    # Ordine fisico Waveshare data0->data15 mappato su RGB565:
    # data0-4 = blue, data5-10 = green, data11-15 = red
    data_pins:
      blue:  [GPIO14, GPIO38, GPIO18, GPIO17, GPIO10]
      green: [GPIO39, GPIO0,  GPIO45, GPIO48, GPIO47, GPIO21]
      red:   [GPIO1,  GPIO2,  GPIO42, GPIO41, GPIO40]

# --- TOUCH GT911 ---
# INT su GPIO4 (diretto ESP32). Reset via IO1 dell'expander, già rilasciato
# (OUTPUT=0xFF nel setup di io_extension_ws). Il GT911 si auto-inizializza a 0x5D.
touchscreen:
  - platform: gt911
    id: my_touch
    interrupt_pin: GPIO4
    address: 0x5D
    # reset hardware del GT911 via IO1 dell'expander -> init affidabile ad ogni boot
    reset_pin:
      io_extension_ws: io_ext
      number: 1
      mode:
        output: true

