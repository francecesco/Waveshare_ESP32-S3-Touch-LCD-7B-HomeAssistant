# Select esposto a HA per cambiare pagina da automazioni
# (es. action: select.select_option -> "Energia")
select:
  - platform: template
    name: "Pagina plancia"
    id: sel_pagina
    optimistic: true
    options:
      - "Home"
      - "Casa"
      - "Energia"
      - "Giardino"
    initial_option: "Home"
    set_action:
      - if:
          condition:
            lambda: 'return x == "Home";'
          then:
            - lvgl.page.show: page_home
      - if:
          condition:
            lambda: 'return x == "Casa";'
          then:
            - lvgl.page.show: page_casa
      - if:
          condition:
            lambda: 'return x == "Energia";'
          then:
            - lvgl.page.show: page_energia
      - if:
          condition:
            lambda: 'return x == "Giardino";'
          then:
            - lvgl.page.show: page_giardino

button:
  - platform: template
    name: "Backlight ON"
    on_press:
      - lambda: 'id(io_ext).set_output_pin(2, true); id(io_ext).set_pwm(200);'
  - platform: template
    name: "Backlight OFF"
    on_press:
      - lambda: 'id(io_ext).set_output_pin(2, false);'

# Slider luminosità backlight (regolazione live da Home Assistant)
# Registro PWM diretto: 0 = minimo, ~247 = massimo, 255 = spento.
# Sposta il valore per trovare il punto più luminoso senza flicker.
number:
  - platform: template
    name: "Luminosita backlight"
    id: backlight_level
    min_value: 0
    max_value: 247
    step: 1
    initial_value: 200
    optimistic: true
    set_action:
      - lambda: 'id(io_ext).set_pwm((uint8_t) x);'
