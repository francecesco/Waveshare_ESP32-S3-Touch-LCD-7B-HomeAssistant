# ============================================================================
#  TEST DISPLAY v17 — LVGL!
#  Il bus RGB e il path di disegno funzionano (show_test_card mostrava le
#  barre RGB). Passiamo a LVGL: schermata bianca (test backlight) + rettangoli
#  rosso/blu etichettati (validazione color_order).
#
#  Carica:  esphome run test-display3.yaml --device test-plancia.local
# ============================================================================

esphome:
  name: test-plancia
  friendly_name: Test Plancia

external_components:
  - source:
      type: local
      path: components
    components: [ io_extension_ws ]

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_LCD_RGB_RESTART_IN_VSYNC: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Test-Plancia Fallback"

api:

ota:
  - platform: esphome

i2c:
  - id: bus_a
    sda: GPIO8
    scl: GPIO9
    scan: true
    frequency: 100kHz

io_extension_ws:
  - id: io_ext
    i2c_id: bus_a

# Font con simboli speciali (° per temperature, € per importi)
font:
  - file: "gfonts://Montserrat"
    id: font_temp
    size: 28
    glyphs: "-.0123456789°"
  - file: "gfonts://Montserrat"
    id: font_euro
    size: 30
    glyphs: "-.,0123456789€kWh "
  # Icone Material Design (scaricate in build dal webfont MDI)
  - file:
      type: web
      url: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_mdi
    size: 40
    bpp: 4
    glyphs:
      - "\U000F0114"  # cash (spesa oggi)
      - "\U000F1A91"  # cash-clock (previsione mese)
      - "\U000F02DA"  # history (mese scorso)
      - "\U000F140B"  # lightning-bolt (consumo)
      - "\U000F0B6C"  # car-electric (Tesla)
      - "\U000F0A48"  # exit-run (Esco)
      - "\U000F059C"  # weather-sunset-up (Buongiorno)
      - "\U000F0594"  # weather-night (Buonanotte)
      - "\U000F0176"  # coffee (Caffe)
      - "\U000F05FA"  # kettle (Bollitore)
      - "\U000F1099"  # air-humidifier (Deumidificatore)
      - "\U000F070D"  # robot-vacuum (Igor)
      - "\U000F111C"  # window-shutter (tapparelle)
      - "\U000F0143"  # chevron-up (tapparelle su)
      - "\U000F0140"  # chevron-down (tapparelle giu)
      - "\U000F04DB"  # stop (tapparelle stop)

